<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — RoundCard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D0D0F; color: #F5F0E8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #1A1A1E; border: 0.5px solid #2A2A2F; border-radius: 16px; padding: 48px 32px; max-width: 400px; width: 90%; text-align: center; }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 24px; }
  .logo span { color: #E8001D; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
  p { color: #9494A0; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .btn { display: block; background: #E8001D; color: white; border-radius: 10px; padding: 14px 28px; font-size: 15px; font-weight: 700; text-decoration: none; margin-bottom: 16px; }
  .sub { font-size: 13px; color: #6B6B72; }
</style>
<script>
  // Try to open the app via deep link
  function openApp() {
    const params = window.location.search;
    const appUrl = 'roundcard://reset-password' + params;
    window.location.href = appUrl;
  }
  // Auto-attempt on load
  window.addEventListener('load', function() {
    setTimeout(openApp, 500);
  });
</script>
</head>
<body>
  <div class="card">
    <div class="logo">ROUND<span>CARD</span></div>
    <h1>Reset Your Password</h1>
    <p>Tap the button below to open the RoundCard app and set your new password.</p>
    <a href="#" class="btn" onclick="openApp(); return false;">Open RoundCard App →</a>
    <p class="sub">Make sure RoundCard is installed on your device.</p>
  </div>
</body>
</html>
