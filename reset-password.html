<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — RoundCard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0D0D0F; color: #F5F0E8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #1A1A1E; border: 0.5px solid #2A2A2F; border-radius: 16px; padding: 48px 32px; max-width: 400px; width: 100%; text-align: center; }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; margin-bottom: 32px; }
  .logo span { color: #E8001D; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: #9494A0; font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; text-align: left; }
  .field label { font-size: 11px; font-weight: 700; color: #9494A0; letter-spacing: 1px; text-transform: uppercase; }
  .field input { background: #0D0D0F; border: 0.5px solid #2A2A2F; border-radius: 10px; padding: 12px 16px; color: #F5F0E8; font-size: 15px; outline: none; width: 100%; }
  .field input:focus { border-color: #E8001D; }
  .btn { width: 100%; background: #E8001D; color: white; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; letter-spacing: 0.5px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .msg { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-top: 16px; display: none; }
  .msg.success { background: rgba(34,197,94,0.1); border: 0.5px solid rgba(34,197,94,0.3); color: #22C55E; }
  .msg.error { background: rgba(232,0,29,0.1); border: 0.5px solid rgba(232,0,29,0.3); color: #E8001D; }
  .app-link { margin-top: 24px; font-size: 13px; color: #6B6B72; }
  .app-link a { color: #E8001D; text-decoration: none; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ROUND<span>CARD</span></div>
  <h1>Reset Password</h1>
  <p class="subtitle">Enter your new password below.</p>

  <div id="form">
    <div class="field">
      <label>New Password</label>
      <input type="password" id="password" placeholder="••••••••" minlength="6"/>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" minlength="6"/>
    </div>
    <button class="btn" id="submitBtn" onclick="resetPassword()">SAVE NEW PASSWORD</button>
  </div>

  <div class="msg" id="msg"></div>

  <div class="app-link">
    <a href="/">← Back to RoundCard</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://aeiosubhurnlwsaqrwwj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlaW9zdWJodXJubHdzYXFyd3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzE3MzAsImV4cCI6MjA5NDk0NzczMH0.N2aN4NOzRpiCtEYhiagyPHjac2Jyj4aDskQLxLz_7cM';

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

// Extract tokens from URL hash
async function init() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken  = params.get('access_token');
  const refreshToken = params.get('refresh_token');
  const type         = params.get('type');

  if (type === 'recovery' && accessToken) {
    // Set the session so we can update the password
    const { error } = await db.auth.setSession({
      access_token: accessToken,
      refresh_token: refreshToken,
    });
    if (error) {
      showMsg('This reset link has expired. Please request a new one.', 'error');
      document.getElementById('form').style.display = 'none';
    }
  } else {
    showMsg('Invalid or expired reset link. Please request a new password reset from the app.', 'error');
    document.getElementById('form').style.display = 'none';
  }
}

async function resetPassword() {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn      = document.getElementById('submitBtn');

  if (!password || password.length < 6) {
    showMsg('Password must be at least 6 characters.', 'error');
    return;
  }
  if (password !== confirm) {
    showMsg('Passwords do not match.', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Saving...';

  const { error } = await db.auth.updateUser({ password });

  if (error) {
    showMsg('Error: ' + error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'SAVE NEW PASSWORD';
  } else {
    showMsg('✓ Password updated successfully! You can now sign in to the RoundCard app with your new password.', 'success');
    document.getElementById('form').style.display = 'none';
  }
}

init();
</script>
</body>
</html>
